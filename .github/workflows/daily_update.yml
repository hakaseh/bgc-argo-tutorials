name: Daily BGC-Argo Map Update

on:
  schedule:
    # This cron schedule runs at 23:59 UTC every day. 
    - cron: '59 23 * * *'
  # This line adds a button in GitHub so you can test it manually!
  workflow_dispatch: 

# FIX: This forces GitHub to use the new Node 24 engine and stops the warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-notebook:
    runs-on: ubuntu-latest
    
    # CRITICAL: This gives the bot permission to push code back to your repo
    permissions:
      contents: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Match the version your tutorials use

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nbconvert  # This is the tool that runs notebooks in the terminal!

      - name: Execute Jupyter Notebook
        run: |
          jupyter nbconvert --to notebook --execute --inplace automation/chla_weekly.ipynb

      - name: Commit and Push Changes
        run: |
          git config --local user.email "hakaseh@jamstec.go.jp"
          git config --local user.name "hakaseh"
          # Tell Git to look inside the automation folder!
          git add automation/chla_weekly.ipynb 
          git commit -m "Automated daily update of BGC-Argo map" || echo "No changes to commit"
          git push
